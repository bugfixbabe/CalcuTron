<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CalcuTron</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Rubik:wght@400;500;700&display=swap');

        :root {
            --sage-dark: #2d5a4f;
            --sage-medium: #3d6d5c;
            --sage-light: #5a8a7a;
            --beige-light: #f5ede0;
            --beige-medium: #e8dcc8;
            --beige-dark: #c4a787;
            --accent-sage: #4a7c6b;
            --accent-light: #7eb09e;
            --text-dark: #2c2c2c;
            --text-light: #f5f5f5;
            --card-bg: rgba(45, 90, 79, 0.15);
            --button-bg: rgba(93, 138, 122, 0.3);
        }

        body {
            font-family: 'Lato', sans-serif;
            background: linear-gradient(135deg, #f5ede0 0%, #e8dcc8 50%, #f0e4d4 100%);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(90, 138, 122, 0.08) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(74, 124, 107, 0.08) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        .calculator-container {
            width: 100%;
            max-width: 1050px;
            background: linear-gradient(135deg, rgba(245, 237, 224, 0.95) 0%, rgba(232, 220, 200, 0.95) 100%);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(45, 90, 79, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.8);
            border: 2px solid rgba(90, 138, 122, 0.2);
            overflow: hidden;
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .header {
            padding: 16px 28px;
            background: linear-gradient(90deg, var(--sage-dark) 0%, var(--sage-medium) 100%);
            border-bottom: 1px solid rgba(90, 138, 122, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-family: 'Rubik', sans-serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.5px;
            color: var(--beige-light);
            text-transform: uppercase;
        }

        .mode-toggle {
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .mode-btn {
            padding: 8px 16px;
            border: 2px solid transparent;
            background: transparent;
            color: var(--beige-light);
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-family: 'Rubik', sans-serif;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, var(--accent-light), var(--accent-sage));
            color: var(--text-dark);
            box-shadow: 0 4px 15px rgba(90, 138, 122, 0.3);
            border-color: var(--accent-light);
        }

        .mode-btn:hover:not(.active) {
            color: var(--beige-medium);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .display-section {
            padding: 16px 28px;
            background: linear-gradient(180deg, rgba(93, 138, 122, 0.08) 0%, rgba(74, 124, 107, 0.04) 100%);
            border-bottom: 1px solid rgba(90, 138, 122, 0.15);
        }

        .history {
            font-size: 10px;
            color: var(--sage-medium);
            height: 14px;
            margin-bottom: 6px;
            text-align: right;
            opacity: 0.7;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .display {
            background: linear-gradient(135deg, rgba(245, 237, 224, 0.7) 0%, rgba(255, 255, 255, 0.8) 100%);
            border: 2px solid var(--sage-light);
            border-radius: 10px;
            padding: 10px 16px;
            text-align: right;
            font-size: 38px;
            font-weight: 700;
            color: var(--sage-dark);
            word-wrap: break-word;
            word-break: break-all;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            font-family: 'Lato', monospace;
            letter-spacing: -0.5px;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.05),
                        0 4px 12px rgba(90, 138, 122, 0.1);
        }

        .memory-indicator {
            font-size: 9px;
            color: var(--sage-medium);
            margin-top: 4px;
            font-weight: 700;
            letter-spacing: 0.2px;
            text-transform: uppercase;
        }

        .buttons-wrapper {
            display: flex;
            gap: 10px;
            background: transparent;
            padding: 16px 28px;
        }

        .buttons-wrapper.standard-mode {
            justify-content: center;
        }

        .scientific-section {
            padding: 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 9px;
            background: transparent;
            border: none;
            flex: 0 0 auto;
            max-width: 320px;
        }

        .scientific-section.hidden {
            display: none;
        }

        .buttons-section {
            padding: 0;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 7px;
            background: transparent;
            flex: 1;
        }

        button {
            padding: 8px 4px;
            border: 2px solid transparent;
            background: linear-gradient(135deg, rgba(93, 138, 122, 0.4), rgba(74, 124, 107, 0.4));
            color: var(--text-dark);
            border-radius: 10px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.2px;
            font-family: 'Rubik', sans-serif;
            position: relative;
            overflow: hidden;
            min-height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 2px 8px rgba(45, 90, 79, 0.1);
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.4s ease;
            z-index: 1;
        }

        button:hover::before {
            left: 100%;
        }

        button:active {
            transform: scale(0.95);
        }

        button:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(90, 138, 122, 0.4), 0 2px 8px rgba(45, 90, 79, 0.1);
        }

        /* Number Buttons */
        .btn-number {
            background: linear-gradient(135deg, var(--beige-light), rgba(245, 237, 224, 0.8));
            border: 2px solid var(--beige-dark);
            color: var(--sage-dark);
            font-weight: 700;
        }

        .btn-number:hover {
            background: linear-gradient(135deg, var(--beige-medium), rgba(232, 220, 200, 0.9));
            border-color: var(--sage-light);
            box-shadow: 0 4px 12px rgba(90, 138, 122, 0.2), inset 0 1px 3px rgba(255, 255, 255, 0.5);
            transform: translateY(-1px);
        }

        /* Operator Buttons */
        .btn-operator {
            background: linear-gradient(135deg, var(--sage-light), var(--accent-sage));
            color: var(--beige-light);
            border: 2px solid var(--sage-dark);
            font-weight: 900;
        }

        .btn-operator:hover {
            background: linear-gradient(135deg, var(--accent-light), var(--sage-light));
            border-color: var(--beige-dark);
            box-shadow: 0 4px 15px rgba(90, 138, 122, 0.25);
            transform: translateY(-1px);
        }

        /* Equals Button */
        .btn-equal {
            background: linear-gradient(135deg, #6ba584, #5a9a74);
            color: var(--beige-light);
            border: 2px solid #4a8a64;
            font-weight: 900;
            grid-column: span 1;
            font-size: 14px;
        }

        .btn-equal:hover {
            background: linear-gradient(135deg, #7bb594, #6aaa84);
            border-color: var(--beige-dark);
            box-shadow: 0 4px 15px rgba(90, 138, 122, 0.3);
            transform: translateY(-1px);
        }

        /* Clear Button */
        .btn-clear {
            background: linear-gradient(135deg, #b8956a, #a88560);
            color: var(--beige-light);
            border: 2px solid #8a6547;
            font-weight: 900;
            font-size: 12px;
        }

        .btn-clear:hover {
            background: linear-gradient(135deg, #c8a57a, #b89570);
            border-color: var(--sage-dark);
            box-shadow: 0 4px 15px rgba(196, 167, 135, 0.3);
            transform: translateY(-1px);
        }

        /* Delete Button */
        .btn-delete {
            background: linear-gradient(135deg, #9d7f6f, #8d6f5f);
            color: var(--beige-light);
            border: 2px solid #6d4f3f;
            font-size: 12px;
            font-weight: 900;
        }

        .btn-delete:hover {
            background: linear-gradient(135deg, #ad8f7f, #9d7f6f);
            border-color: var(--sage-dark);
            box-shadow: 0 4px 12px rgba(157, 127, 111, 0.3);
            transform: translateY(-1px);
        }

        /* Decimal Button */
        .btn-decimal {
            background: linear-gradient(135deg, var(--beige-light), rgba(245, 237, 224, 0.8));
            border: 2px solid var(--beige-dark);
            color: var(--sage-dark);
            font-weight: 900;
            font-size: 18px;
        }

        .btn-decimal:hover {
            background: linear-gradient(135deg, var(--beige-medium), rgba(232, 220, 200, 0.9));
            border-color: var(--sage-light);
            box-shadow: 0 4px 12px rgba(90, 138, 122, 0.2);
            transform: translateY(-1px);
        }

        /* Function Buttons */
        .btn-function {
            background: linear-gradient(135deg, var(--accent-sage), var(--sage-medium));
            color: var(--beige-light);
            border: 2px solid var(--sage-dark);
            font-size: 13px;
            font-weight: 900;
            min-height: 54px;
            padding: 12px 8px;
        }

        .btn-function:hover {
            background: linear-gradient(135deg, var(--sage-light), var(--accent-light));
            border-color: var(--beige-dark);
            box-shadow: 0 4px 12px rgba(90, 138, 122, 0.25);
            transform: translateY(-1px);
        }

        /* Memory Buttons */
        .btn-memory {
            background: linear-gradient(135deg, var(--accent-light), rgba(126, 176, 158, 0.8));
            color: var(--text-dark);
            border: 2px solid var(--sage-light);
            font-size: 12px;
            font-weight: 900;
            min-height: 54px;
            padding: 12px 8px;
        }

        .btn-memory:hover {
            background: linear-gradient(135deg, rgba(126, 176, 158, 0.9), var(--accent-sage));
            border-color: var(--sage-dark);
            box-shadow: 0 4px 12px rgba(90, 138, 122, 0.25);
            transform: translateY(-1px);
        }

        /* Bracket Buttons */
        .btn-bracket {
            background: linear-gradient(135deg, #d4a574, #c4956a);
            color: var(--beige-light);
            border: 2px solid #a4854a;
            font-size: 16px;
            font-weight: 900;
            min-height: 54px;
            padding: 12px 8px;
        }

        .btn-bracket:hover {
            background: linear-gradient(135deg, #e4b584, #d4a574);
            border-color: var(--sage-dark);
            box-shadow: 0 4px 12px rgba(196, 165, 116, 0.3);
            transform: translateY(-1px);
        }

        /* Angle Toggle Button */
        .btn-angle {
            background: linear-gradient(135deg, var(--sage-medium), var(--accent-sage));
            color: var(--beige-light);
            border: 2px solid var(--sage-dark);
            font-size: 12px;
            font-weight: 900;
            min-height: 54px;
            padding: 12px 8px;
        }

        .btn-angle:hover {
            background: linear-gradient(135deg, var(--sage-light), var(--accent-light));
            border-color: var(--beige-dark);
            box-shadow: 0 4px 12px rgba(90, 138, 122, 0.25);
            transform: translateY(-1px);
        }

        .btn-angle.active {
            background: linear-gradient(135deg, var(--accent-light), var(--sage-light));
            box-shadow: 0 4px 15px rgba(90, 138, 122, 0.35);
        }

        @media (max-width: 1100px) {
            .calculator-container {
                max-width: 95vw;
            }
        }

        @media (max-width: 900px) {
            .buttons-wrapper {
                flex-direction: column;
                gap: 8px;
            }

            .scientific-section {
                max-width: 100%;
                order: -1;
            }
        }

        @media (max-width: 600px) {
            .calculator-container {
                max-width: 100%;
                border-radius: 16px;
            }

            .header {
                padding: 12px 16px;
            }

            .title {
                font-size: 24px;
            }

            .display-section {
                padding: 12px 16px;
            }

            .display {
                font-size: 28px;
                min-height: 45px;
                padding: 8px 12px;
            }

            button {
                font-size: 10px;
                min-height: 38px;
                padding: 6px 2px;
            }

            .btn-function {
                min-height: 45px;
            }

            .buttons-wrapper {
                padding: 12px 16px;
                gap: 8px;
            }

            .buttons-section {
                gap: 5px;
            }

            .scientific-section {
                gap: 5px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="header">
            <div class="title">⚡ CALC</div>
            <div class="mode-toggle">
                <button class="mode-btn active" data-mode="standard">STD</button>
                <button class="mode-btn" data-mode="scientific">SCI</button>
            </div>
        </div>

        <div class="display-section">
            <div class="history" id="history"></div>
            <div class="display" id="display">0</div>
            <div class="memory-indicator" id="memoryIndicator"></div>
        </div>

        <!-- Buttons Wrapper -->
        <div class="buttons-wrapper standard-mode" id="buttonsWrapper">
            <!-- Scientific Functions (Hidden by default) -->
            <div class="scientific-section hidden" id="scientificSection">
                <button class="btn-angle" id="degRadBtn">DEG</button>
                <button style="visibility: hidden;"></button>
                <button class="btn-function" data-func="factorial">x!</button>
                
                <button class="btn-function" data-func="inv">INV</button>
                <button class="btn-function" data-func="sin">SIN</button>
                <button class="btn-function" data-func="ln">LN</button>
                
                <button class="btn-function" data-func="pi">π</button>
                <button class="btn-function" data-func="cos">COS</button>
                <button class="btn-function" data-func="log">LOG</button>
                
                <button class="btn-function" data-func="e">e</button>
                <button class="btn-function" data-func="tan">TAN</button>
                <button class="btn-function" data-func="sqrt">√</button>
                
                <button class="btn-memory" data-memory="ans">ANS</button>
                <button class="btn-function" data-func="exp">EXP</button>
                <button class="btn-function" data-func="power">x^y</button>
                
                <button class="btn-function" data-func="cbrt">∛</button>
                <button class="btn-bracket" data-bracket="(">(</button>
                <button class="btn-bracket" data-bracket=")">)</button>
            </div>

            <!-- Main Calculator Buttons -->
            <div class="buttons-section">
                <!-- Row 1 -->
                <button class="btn-clear" id="clearBtn">AC</button>
                <button class="btn-delete" id="deleteBtn">DEL</button>
                <button class="btn-operator" data-operator="%">%</button>
                <button class="btn-operator" data-operator="/">÷</button>

                <!-- Row 2 -->
                <button class="btn-number" data-number="7">7</button>
                <button class="btn-number" data-number="8">8</button>
                <button class="btn-number" data-number="9">9</button>
                <button class="btn-operator" data-operator="*">×</button>

                <!-- Row 3 -->
                <button class="btn-number" data-number="4">4</button>
                <button class="btn-number" data-number="5">5</button>
                <button class="btn-number" data-number="6">6</button>
                <button class="btn-operator" data-operator="-">−</button>

                <!-- Row 4 -->
                <button class="btn-number" data-number="1">1</button>
                <button class="btn-number" data-number="2">2</button>
                <button class="btn-number" data-number="3">3</button>
                <button class="btn-operator" data-operator="+">+</button>

                <!-- Row 5 -->
                <button class="btn-number" data-number="0" style="grid-column: span 2;">0</button>
                <button class="btn-decimal" data-number=".">.</button>
                <button class="btn-equal" id="equalBtn">=</button>
            </div>
        </div>
    </div>

    <script>
        class ScientificCalculator {
            constructor() {
                this.display = document.getElementById('display');
                this.history = document.getElementById('history');
                this.memoryIndicator = document.getElementById('memoryIndicator');
                this.clearBtn = document.getElementById('clearBtn');
                this.deleteBtn = document.getElementById('deleteBtn');
                this.equalBtn = document.getElementById('equalBtn');
                this.scientificSection = document.getElementById('scientificSection');
                this.degRadBtn = document.getElementById('degRadBtn');
                
                this.currentValue = '0';
                this.previousValue = '';
                this.operation = null;
                this.memory = 0;
                this.lastAnswer = 0;
                this.shouldResetDisplay = false;
                this.angleMode = 'deg';
                this.isScientific = false;
                this.inverseMode = false;
                this.bracketCount = 0;
                
                this.init();
            }

            init() {
                this.attachEventListeners();
                this.updateDisplay();
                this.updateDegRadButton();
            }

            attachEventListeners() {
                document.querySelectorAll('[data-number]').forEach(btn => {
                    btn.addEventListener('click', e => this.inputNumber(e.target.dataset.number));
                });

                document.querySelectorAll('[data-operator]').forEach(btn => {
                    btn.addEventListener('click', e => this.setOperation(e.target.dataset.operator));
                });

                document.querySelectorAll('[data-func]').forEach(btn => {
                    btn.addEventListener('click', e => this.scientificFunction(e.target.dataset.func));
                });

                document.querySelectorAll('[data-memory]').forEach(btn => {
                    btn.addEventListener('click', e => this.memoryOperation(e.target.dataset.memory));
                });

                document.querySelectorAll('[data-bracket]').forEach(btn => {
                    btn.addEventListener('click', e => this.inputBracket(e.target.dataset.bracket));
                });

                this.degRadBtn?.addEventListener('click', () => this.toggleAngleMode());

                this.clearBtn.addEventListener('click', () => this.clear());
                this.deleteBtn.addEventListener('click', () => this.delete());
                this.equalBtn.addEventListener('click', () => this.calculate());

                document.querySelectorAll('[data-mode]').forEach(btn => {
                    btn.addEventListener('click', e => this.toggleMode(e.target.dataset.mode));
                });

                document.addEventListener('keydown', e => this.handleKeyboard(e));
            }

            inputNumber(num) {
                if (this.shouldResetDisplay) {
                    this.currentValue = num === '.' ? '0.' : num;
                    this.shouldResetDisplay = false;
                } else {
                    if (num === '.') {
                        if (this.currentValue.includes('.')) return;
                        this.currentValue += num;
                    } else {
                        this.currentValue = this.currentValue === '0' ? num : this.currentValue + num;
                    }
                }
                this.updateDisplay();
            }

            inputBracket(bracket) {
                if (bracket === '(') {
                    if (this.shouldResetDisplay || this.currentValue === '0') {
                        this.currentValue = '(';
                    } else {
                        this.currentValue += '×(';
                    }
                    this.bracketCount++;
                } else {
                    if (this.bracketCount > 0) {
                        this.currentValue += ')';
                        this.bracketCount--;
                    }
                }
                this.shouldResetDisplay = false;
                this.updateDisplay();
            }

            setOperation(op) {
                if (this.operation !== null && !this.shouldResetDisplay) {
                    this.calculate();
                }
                this.previousValue = this.currentValue;
                this.operation = op;
                this.shouldResetDisplay = true;
                this.updateHistory();
            }

            calculate() {
                if (this.shouldResetDisplay && this.operation === null) return;

                try {
                    let expr = this.currentValue;
                    expr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                    
                    if (this.operation) {
                        expr = this.previousValue + this.operation + expr;
                        expr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                    }
                    
                    let result = Function('"use strict"; return (' + expr + ')')();
                    
                    if (isNaN(result) || !isFinite(result)) {
                        this.currentValue = 'Error';
                    } else {
                        this.currentValue = this.formatResult(result);
                        this.lastAnswer = result;
                    }
                } catch (e) {
                    this.currentValue = 'Error';
                }
                
                this.operation = null;
                this.previousValue = '';
                this.shouldResetDisplay = true;
                this.bracketCount = 0;
                this.updateDisplay();
                this.updateHistory();
            }

            scientificFunction(func) {
                const value = parseFloat(this.currentValue);
                let result;

                try {
                    switch (func) {
                        case 'sin':
                            result = this.inverseMode 
                                ? (this.angleMode === 'deg' ? Math.asin(value) * 180 / Math.PI : Math.asin(value))
                                : (this.angleMode === 'deg' ? Math.sin(value * Math.PI / 180) : Math.sin(value));
                            break;
                        case 'cos':
                            result = this.inverseMode
                                ? (this.angleMode === 'deg' ? Math.acos(value) * 180 / Math.PI : Math.acos(value))
                                : (this.angleMode === 'deg' ? Math.cos(value * Math.PI / 180) : Math.cos(value));
                            break;
                        case 'tan':
                            result = this.inverseMode
                                ? (this.angleMode === 'deg' ? Math.atan(value) * 180 / Math.PI : Math.atan(value))
                                : (this.angleMode === 'deg' ? Math.tan(value * Math.PI / 180) : Math.tan(value));
                            break;
                        case 'log': result = Math.log10(value); break;
                        case 'ln': result = Math.log(value); break;
                        case 'sqrt': result = Math.sqrt(value); break;
                        case 'cbrt': result = Math.cbrt(value); break;
                        case 'factorial': result = this.factorial(Math.floor(value)); break;
                        case 'pi': this.currentValue = Math.PI.toString(); break;
                        case 'e': this.currentValue = Math.E.toString(); break;
                        case 'exp': result = Math.exp(value); break;
                        case 'power': this.currentValue += '^'; break;
                        case 'inv': 
                            this.inverseMode = !this.inverseMode;
                            return;
                        default: return;
                    }

                    if (func !== 'pi' && func !== 'e' && func !== 'power' && func !== 'inv') {
                        this.currentValue = this.formatResult(result);
                    }
                    this.shouldResetDisplay = true;
                    this.updateDisplay();
                } catch (e) {
                    this.currentValue = 'Error';
                    this.updateDisplay();
                }
            }

            factorial(n) {
                if (n < 0) return NaN;
                if (n === 0 || n === 1) return 1;
                let result = 1;
                for (let i = 2; i <= n; i++) {
                    result *= i;
                }
                return result;
            }

            memoryOperation(op) {
                const current = parseFloat(this.currentValue);

                switch (op) {
                    case 'mc': this.memory = 0; break;
                    case 'mr': this.currentValue = this.formatResult(this.memory); this.shouldResetDisplay = true; break;
                    case 'mplus': this.memory += current; break;
                    case 'mminus': this.memory -= current; break;
                    case 'ans': this.currentValue = this.formatResult(this.lastAnswer); this.shouldResetDisplay = true; break;
                }

                this.updateDisplay();
                this.updateMemoryIndicator();
            }

            toggleAngleMode() {
                this.angleMode = this.angleMode === 'deg' ? 'rad' : 'deg';
                this.updateDegRadButton();
            }

            updateDegRadButton() {
                const isActive = this.angleMode === 'deg';
                this.degRadBtn.textContent = isActive ? 'DEG' : 'RAD';
            }

            delete() {
                if (this.currentValue.length > 1) {
                    const last = this.currentValue[this.currentValue.length - 1];
                    if (last === ')') this.bracketCount++;
                    if (last === '(') this.bracketCount--;
                    this.currentValue = this.currentValue.slice(0, -1);
                } else {
                    this.currentValue = '0';
                }
                this.updateDisplay();
            }

            clear() {
                this.currentValue = '0';
                this.previousValue = '';
                this.operation = null;
                this.shouldResetDisplay = false;
                this.bracketCount = 0;
                this.inverseMode = false;
                this.updateDisplay();
                this.updateHistory();
            }

            toggleMode(mode) {
                this.isScientific = mode === 'scientific';
                const buttonsWrapper = document.getElementById('buttonsWrapper');
                
                this.scientificSection.classList.toggle('hidden', !this.isScientific);
                buttonsWrapper.classList.toggle('standard-mode', !this.isScientific);
                
                document.querySelectorAll('[data-mode]').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.mode === mode);
                });
            }

            formatResult(num) {
                if (isNaN(num) || !isFinite(num)) return 'Error';
                const rounded = Math.round(num * 1e10) / 1e10;
                return rounded.toString();
            }

            updateDisplay() {
                this.display.textContent = this.currentValue;
            }

            updateHistory() {
                if (this.operation) {
                    this.history.textContent = `${this.previousValue} ${this.operation}`;
                } else {
                    this.history.textContent = '';
                }
            }

            updateMemoryIndicator() {
                if (this.memory === 0) {
                    this.memoryIndicator.textContent = '';
                } else {
                    this.memoryIndicator.textContent = `Memory: ${this.formatResult(this.memory)}`;
                }
            }

            handleKeyboard(e) {
                const key = e.key;

                if (/[0-9.]/.test(key)) {
                    this.inputNumber(key);
                } else if (key === 'Enter' || key === '=') {
                    e.preventDefault();
                    this.calculate();
                } else if (key === 'Backspace') {
                    e.preventDefault();
                    this.delete();
                } else if (key === 'Escape') {
                    this.clear();
                } else if (['+', '-', '*', '/'].includes(key)) {
                    e.preventDefault();
                    this.setOperation(key);
                } else if (key === '(') {
                    e.preventDefault();
                    this.inputBracket('(');
                } else if (key === ')') {
                    e.preventDefault();
                    this.inputBracket(')');
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new ScientificCalculator();
        });
    </script>
</body>
</html>
